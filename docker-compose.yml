services:
    db:
        image: postgres:15-alpine
        container_name: odoo18-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: postgres
            POSTGRES_USER: ${POSTGRES_USER:-odoo}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
        volumes:
            - odoo-db-data:/var/lib/postgresql/data
        networks:
            - odoo-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-odoo} -d postgres",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    odoo:
        image: odoo:18.0
        container_name: odoo18-web
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "8069:8069"
        environment:
            HOST: db
            USER: ${POSTGRES_USER:-odoo}
            PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
        command: >
            odoo --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/addons,/mnt/addons_e,/mnt/project,/mnt/accounting,/mnt/fleet,/mnt/hr,/mnt/inv_purchase_sales,/mnt/manufacturing,/mnt/theme
            --admin-passwd=${ADMIN_PASSWD:?Set ADMIN_PASSWD in .env}
        volumes:
            - odoo-web-data:/var/lib/odoo
            - ./addons:/mnt/addons
            - ./addons_e:/mnt/addons_e
            - ./project:/mnt/project
            - ./accounting:/mnt/accounting
            - ./fleet:/mnt/fleet
            - ./hr:/mnt/hr
            - ./inv_purchase_sales:/mnt/inv_purchase_sales
            - ./manufacturing:/mnt/manufacturing
            - ./theme:/mnt/theme
        networks:
            - odoo-network

    nginx:
        image: nginx:alpine
        container_name: odoo18-nginx
        restart: unless-stopped
        depends_on:
            - odoo
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
            - ./certbot-webroot:/var/www/certbot:ro
        networks:
            - odoo-network

volumes:
    odoo-db-data:
    odoo-web-data:

networks:
    odoo-network:
        driver: bridge
