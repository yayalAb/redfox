# Nginx reverse proxy for Odoo 18
# Place this in /etc/nginx/sites-available/odoo (or sites-enabled) on Ubuntu

upstream odoo {
    server odoo:8069;
}

upstream odoochat {
    server odoo:8072;
}

# HTTP - redirect to HTTPS (uncomment when using SSL)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl;  # Uncomment for HTTPS
    server_name _;  # Replace with your domain: your-domain.com

    # SSL certificates (uncomment when using Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Logging
    access_log /var/log/nginx/odoo_access.log;
    error_log /var/log/nginx/odoo_error.log;

    # Increase buffer sizes for long headers (Odoo uses many cookies)
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # Force timeouts if the backend dies
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;

    # Set proper headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Odoo web interface
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # Odoo longpolling (for real-time updates)
    location /longpolling {
        proxy_pass http://odoochat;
        proxy_redirect off;
    }

    # Cache static files
    location ~* /web/static/ {
        proxy_cache_valid 60m;
        proxy_buffering on;
        proxy_pass http://odoo;
    }
}
